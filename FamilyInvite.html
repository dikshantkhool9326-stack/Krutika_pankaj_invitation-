<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DikshantGPT • You're Invited</title>
  <meta name="description" content="DikshantGPT — Special Event Detection System • Friends & Family Invitation" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />
  <style>
/* ============================================================
   DikshantGPT — Special Event Detection System
   Dark mode, terminal-style theme
   ============================================================ */

:root {
  --bg: #05070d;
  --bg-2: #070b14;
  --panel: #0b1020;
  --panel-2: #0e1426;
  --bot-bubble: #0f1830;
  --user-bubble: #15253f;
  --green: #3ef0a0;
  --green-dim: #1f7a55;
  --cyan: #39d0ff;
  --pink: #ff4d8d;
  --gold: #ffd93d;
  --violet: #b06bff;
  --text: #d6efe7;
  --muted: #6b7d9b;
  --border: #1b2540;
  --glow: 0 0 8px rgba(62, 240, 160, 0.55);
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
  --font-display: 'Orbitron', var(--font-mono);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(57, 208, 255, 0.08), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(176, 107, 255, 0.08), transparent 60%),
    linear-gradient(180deg, var(--bg), var(--bg-2));
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.hidden { display: none !important; }

/* ---------- CRT scanlines ---------- */
.scanlines {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255, 255, 255, 0.015) 0px,
    rgba(255, 255, 255, 0.015) 1px,
    transparent 2px,
    transparent 3px
  );
  mix-blend-mode: overlay;
  opacity: 0.6;
}

/* ---------- Confetti ---------- */
#confetti {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 5000;
}

/* ============================================================
   BOOT SCREEN
   ============================================================ */
.boot {
  position: fixed;
  inset: 0;
  z-index: 8000;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  transition: opacity 0.6s ease;
}
.boot.hide {
  opacity: 0;
  pointer-events: none;
}
.boot-inner {
  width: min(680px, 100%);
  font-size: clamp(0.85rem, 2.6vw, 1.05rem);
  line-height: 1.9;
}
.boot-text {
  color: var(--green);
  white-space: pre-wrap;
  text-shadow: var(--glow);
}
.bcaret {
  color: var(--green);
  text-shadow: var(--glow);
  animation: blink 1s steps(1) infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* ============================================================
   APP WINDOW
   ============================================================ */
.app {
  width: min(820px, 100%);
  height: min(92dvh, 880px);
  margin: 16px;
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow:
    0 30px 80px rgba(0, 0, 0, 0.6),
    0 0 0 1px rgba(57, 208, 255, 0.05),
    inset 0 1px 0 rgba(255, 255, 255, 0.03);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: appIn 0.6s ease both;
}
@keyframes appIn {
  from { opacity: 0; transform: translateY(14px) scale(0.99); }
  to   { opacity: 1; transform: none; }
}

/* ---------- Title bar ---------- */
.titlebar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  background: rgba(255, 255, 255, 0.02);
  border-bottom: 1px solid var(--border);
}
.dots { display: flex; gap: 8px; }
.dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  display: inline-block;
}
.dot.red { background: #ff5f57; }
.dot.yellow { background: #febc2e; }
.dot.green { background: #28c840; }
.title {
  flex: 1;
  display: flex;
  flex-direction: column;
  line-height: 1.2;
  min-width: 0;
}
.title-brand {
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--green);
  text-shadow: var(--glow);
  font-size: 0.98rem;
}
.title-sub {
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.info-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--cyan);
  width: 34px; height: 34px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1.1rem;
  transition: 0.2s;
}
.info-btn:hover {
  border-color: var(--cyan);
  box-shadow: 0 0 10px rgba(57, 208, 255, 0.35);
}

/* ---------- Window / chat ---------- */
.window {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 22px 18px 8px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  scroll-behavior: smooth;
}
.chat::-webkit-scrollbar { width: 10px; }
.chat::-webkit-scrollbar-thumb {
  background: #1c2a4a;
  border-radius: 10px;
  border: 2px solid transparent;
  background-clip: padding-box;
}
.chat::-webkit-scrollbar-thumb:hover { background: #284070; }

/* ---------- Messages ---------- */
.msg {
  display: flex;
  gap: 10px;
  max-width: 92%;
  animation: msgIn 0.32s ease both;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.avatar {
  flex: 0 0 auto;
  width: 34px; height: 34px;
  border-radius: 9px;
  display: grid;
  place-items: center;
  font-size: 1.05rem;
  background: radial-gradient(circle at 30% 30%, #143b30, #0a1c18);
  border: 1px solid var(--green-dim);
  box-shadow: 0 0 10px rgba(62, 240, 160, 0.25);
}
.bubble {
  background: var(--bot-bubble);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 13px;
  min-width: 0;
}
.msg.user .bubble {
  background: var(--user-bubble);
  border-color: #244067;
}
.name {
  font-size: 0.62rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 4px;
  opacity: 0.85;
}
.content {
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.65;
  font-size: 0.92rem;
}
.msg.user .content { color: #cfe0ff; }

/* typing caret while bot writes */
.content.caret::after {
  content: '';
  display: inline-block;
  width: 8px;
  height: 1.05em;
  background: var(--green);
  margin-left: 2px;
  vertical-align: -2px;
  box-shadow: var(--glow);
  animation: blink 1s steps(1) infinite;
}

/* typing indicator (three dots) */
.typing { display: inline-flex; gap: 5px; padding: 4px 2px; }
.typing i {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  opacity: 0.5;
  animation: bounce 1.2s infinite ease-in-out;
}
.typing i:nth-child(2) { animation-delay: 0.15s; }
.typing i:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-5px); opacity: 1; }
}

/* ============================================================
   CHOICE BUTTONS
   ============================================================ */
.choices {
  align-self: flex-start;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin: 2px 0 4px 44px;
  animation: msgIn 0.32s ease both;
}
.choice {
  font-family: var(--font-mono);
  font-size: 0.88rem;
  color: var(--text);
  background: linear-gradient(180deg, #122039, #0d172b);
  border: 1px solid #26406d;
  border-radius: 10px;
  padding: 10px 16px;
  cursor: pointer;
  transition: 0.18s;
}
.choice:hover:not(:disabled) {
  border-color: var(--green);
  color: #fff;
  box-shadow: 0 0 14px rgba(62, 240, 160, 0.35);
  transform: translateY(-1px);
}
.choice:disabled { opacity: 0.45; cursor: default; }

/* ============================================================
   STAT BARS (relationship analysis)
   ============================================================ */
.stats { display: flex; flex-direction: column; gap: 10px; min-width: min(440px, 70vw); }
.stat-row {
  display: grid;
  grid-template-columns: 96px 1fr 54px;
  align-items: center;
  gap: 10px;
}
.stat-label { font-size: 0.82rem; color: var(--muted); }
.stat-track {
  height: 12px;
  background: #0a1426;
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
}
.stat-fill {
  height: 100%;
  width: 0%;
  border-radius: 20px;
  background: linear-gradient(90deg, var(--green-dim), var(--green));
  box-shadow: 0 0 12px rgba(62, 240, 160, 0.5);
}
.stat-fill.inf {
  background: linear-gradient(90deg, var(--violet), var(--pink), var(--gold), var(--cyan), var(--green));
  background-size: 300% 100%;
  animation: shimmer 2.2s linear infinite;
}
@keyframes shimmer { to { background-position: 300% 0; } }
.stat-val {
  font-size: 0.85rem;
  text-align: right;
  color: var(--green);
  font-weight: 700;
}

/* ============================================================
   LOADING BAR (emotional analysis)
   ============================================================ */
.loadbar {
  height: 16px;
  background: #0a1426;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin-top: 4px;
  min-width: min(420px, 70vw);
}
.loadbar-fill {
  height: 100%;
  width: 0%;
  background: repeating-linear-gradient(90deg, var(--green) 0 12px, #1aa873 12px 16px);
  box-shadow: 0 0 12px rgba(62, 240, 160, 0.55);
}
.loadbar-pct {
  display: inline-block;
  margin-top: 6px;
  font-size: 0.82rem;
  color: var(--green);
  font-weight: 700;
}

/* happiness result */
.happy { display: flex; flex-direction: column; gap: 14px; min-width: min(440px, 72vw); }
.happy-row .hl { font-size: 0.82rem; color: var(--muted); display: block; margin-bottom: 6px; }
.happy-row.hi .hl { color: var(--pink); }
.happy-bar {
  height: 14px;
  background: #0a1426;
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  position: relative;
}
.happy-fill {
  height: 100%;
  width: 0%;
  border-radius: 20px;
  background: linear-gradient(90deg, #8a6d12, var(--gold));
}
.happy-row.hi .happy-fill {
  background: linear-gradient(90deg, var(--pink), #ff9ec4);
  box-shadow: 0 0 14px rgba(255, 77, 141, 0.5);
}
.happy-num { font-size: 0.82rem; font-weight: 700; margin-top: 5px; color: var(--text); }
.happy-row.hi .happy-num { color: var(--pink); }

/* ============================================================
   REVEAL CARD
   ============================================================ */
.reveal-card {
  position: relative;
  margin-top: 6px;
  padding: 26px 22px;
  border-radius: 16px;
  text-align: center;
  background:
    radial-gradient(120% 120% at 50% 0%, rgba(255, 77, 141, 0.12), transparent 55%),
    linear-gradient(180deg, #121a33, #0c1124);
  border: 1px solid #2a3c66;
  box-shadow: 0 0 0 1px rgba(255, 77, 141, 0.12), 0 18px 50px rgba(0, 0, 0, 0.5);
  min-width: min(420px, 76vw);
  opacity: 0;
  transform: scale(0.9) rotateX(12deg);
  transition: transform 0.7s cubic-bezier(.2,.9,.2,1), opacity 0.7s ease;
}
.reveal-card.show { opacity: 1; transform: none; }
.reveal-card .ring {
  font-size: 2.4rem;
  animation: floaty 3s ease-in-out infinite;
}
@keyframes floaty { 50% { transform: translateY(-8px); } }
.rc-title {
  font-family: var(--font-display);
  font-weight: 900;
  letter-spacing: 2px;
  font-size: 1.02rem;
  margin: 6px 0 4px;
  color: var(--gold);
  text-shadow: 0 0 14px rgba(255, 217, 61, 0.4);
}
.rc-couple {
  font-family: var(--font-display);
  font-size: 1.7rem;
  font-weight: 700;
  margin: 10px 0 16px;
  color: #fff;
  text-shadow: 0 0 18px rgba(255, 77, 141, 0.55);
}
.rc-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 18px;
}
.rc-grid > div {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
}
.rc-grid .full { grid-column: 1 / -1; }
.rc-grid span {
  display: block;
  font-size: 0.62rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}
.rc-grid b { font-size: 0.95rem; color: var(--text); }
.map-btn {
  display: inline-block;
  text-decoration: none;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 0.9rem;
  color: #06121f;
  background: linear-gradient(180deg, #6df0c2, var(--green));
  padding: 11px 22px;
  border-radius: 10px;
  transition: 0.2s;
  box-shadow: 0 0 16px rgba(62, 240, 160, 0.4);
}
.map-btn:hover { transform: translateY(-2px); filter: brightness(1.08); }

/* ============================================================
   SQL BLOCK
   ============================================================ */
.sql {
  margin: 4px 0 0;
  padding: 14px 16px;
  background: #060c16;
  border: 1px solid var(--border);
  border-left: 3px solid var(--cyan);
  border-radius: 8px;
  color: var(--cyan);
  font-size: 0.85rem;
  line-height: 1.6;
  white-space: pre;
  overflow-x: auto;
  text-shadow: 0 0 8px rgba(57, 208, 255, 0.35);
}

/* ============================================================
   COUNTDOWN
   ============================================================ */
.countdown {
  margin-top: 6px;
  text-align: center;
  min-width: min(440px, 80vw);
}
.cd-title {
  font-family: var(--font-display);
  letter-spacing: 2px;
  color: var(--cyan);
  font-size: 0.9rem;
  margin-bottom: 14px;
  text-shadow: 0 0 12px rgba(57, 208, 255, 0.4);
}
.cd-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.cd-cell {
  background: linear-gradient(180deg, #101a31, #0b1222);
  border: 1px solid #243a63;
  border-radius: 12px;
  padding: 14px 6px;
}
.cd-cell b {
  display: block;
  font-family: var(--font-display);
  font-size: clamp(1.4rem, 6vw, 2rem);
  color: #fff;
  text-shadow: 0 0 16px rgba(62, 240, 160, 0.5);
}
.cd-cell span {
  font-size: 0.6rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
}
.cd-foot {
  margin-top: 16px;
  font-size: 1.05rem;
  color: var(--pink);
  text-shadow: 0 0 14px rgba(255, 77, 141, 0.5);
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse { 50% { opacity: 0.7; } }

/* ============================================================
   INPUT AREA
   ============================================================ */
.input-area {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.02);
}
.prompt-sign { color: var(--green); font-weight: 700; text-shadow: var(--glow); }
.user-input {
  flex: 1;
  background: #060c16;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.92rem;
  padding: 11px 14px;
  outline: none;
  transition: 0.2s;
}
.user-input:focus { border-color: var(--green); box-shadow: 0 0 10px rgba(62, 240, 160, 0.25); }
.user-input::placeholder { color: #41506e; }
.user-input:disabled { opacity: 0.5; }
.send-btn {
  background: linear-gradient(180deg, #143b30, #0c241d);
  border: 1px solid var(--green-dim);
  color: var(--green);
  width: 44px; height: 44px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 1rem;
  transition: 0.2s;
}
.send-btn:hover { box-shadow: 0 0 12px rgba(62, 240, 160, 0.4); transform: translateY(-1px); }

/* ============================================================
   SIDE PANEL
   ============================================================ */
.side-panel {
  position: fixed;
  top: 0; right: 0;
  height: 100dvh;
  width: 320px;
  max-width: 86vw;
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border-left: 1px solid var(--border);
  box-shadow: -20px 0 60px rgba(0, 0, 0, 0.5);
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(.2,.9,.2,1);
  z-index: 7000;
  display: flex;
  flex-direction: column;
}
.side-panel.open { transform: none; }
.side-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-display);
  letter-spacing: 1.5px;
  color: var(--cyan);
  font-size: 0.9rem;
}
.close-panel {
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 1rem;
  cursor: pointer;
}
.close-panel:hover { color: var(--pink); }
.side-body { padding: 18px; overflow-y: auto; }
.info-block { margin-bottom: 18px; }
.info-label {
  font-size: 0.62rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.info-value { font-size: 1rem; color: var(--green); text-shadow: var(--glow); }
.info-value.pink { color: var(--pink); text-shadow: 0 0 10px rgba(255, 77, 141, 0.4); }
.info-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
.info-list li { color: var(--text); font-size: 0.9rem; }
.info-hint {
  margin-top: 8px;
  font-size: 0.78rem;
  color: var(--muted);
  line-height: 1.6;
  border-top: 1px dashed var(--border);
  padding-top: 14px;
}
.info-hint b { color: var(--cyan); }

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 6500;
}
.overlay.show { opacity: 1; pointer-events: auto; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 560px) {
  .app { margin: 0; height: 100dvh; border-radius: 0; border: none; }
  .title-sub { display: none; }
  .choices { margin-left: 0; }
  .msg { max-width: 100%; }
  .stat-row { grid-template-columns: 80px 1fr 46px; }
  .rc-couple { font-size: 1.4rem; }
}

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}

  </style>
</head>
<body>
  <!-- Confetti layer -->
  <canvas id="confetti" aria-hidden="true"></canvas>
  <!-- CRT scanline overlay -->
  <div class="scanlines" aria-hidden="true"></div>

  <!-- ===== Boot Screen ===== -->
  <section id="boot" class="boot">
    <div class="boot-inner">
      <span id="boot-text" class="boot-text"></span><span class="bcaret">&#9611;</span>
    </div>
  </section>

  <!-- ===== Main App ===== -->
  <main id="app" class="app hidden">
    <header class="titlebar">
      <div class="dots" aria-hidden="true">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
      </div>
      <div class="title">
        <span class="title-brand">DikshantGPT</span>
        <span class="title-sub">Special Event Detection System</span>
      </div>
      <button id="infoBtn" class="info-btn" title="Model Information" aria-label="Model Information">&#9432;</button>
    </header>

    <div class="window">
      <div id="chat" class="chat" aria-live="polite"></div>

      <form id="inputForm" class="input-area" autocomplete="off">
        <span class="prompt-sign" aria-hidden="true">&gt;</span>
        <input id="userInput" class="user-input" type="text" placeholder="Type a message…" aria-label="Message to DikshantGPT" disabled />
        <button type="submit" class="send-btn" aria-label="Send message">&#10148;</button>
      </form>
    </div>
  </main>

  <!-- ===== Side Panel: Model Information ===== -->
  <aside id="sidePanel" class="side-panel" aria-hidden="true">
    <div class="side-head">
      <span>Model Information</span>
      <button id="closePanel" class="close-panel" aria-label="Close panel">&#10005;</button>
    </div>
    <div class="side-body">
      <div class="info-block">
        <div class="info-label">Model Name</div>
        <div class="info-value">DikshantGPT Infinity</div>
      </div>
      <div class="info-block">
        <div class="info-label">Training Data</div>
        <ul class="info-list">

        </ul>
      </div>

        <div class="info-label">Accuracy</div>

      </div>

  <div id="overlay" class="overlay"></div>

  <script>
/* ============================================================
   DikshantGPT — Special Event Detection System
   FRIENDS & FAMILY EDITION
   A warm, guest-friendly invitation flow.
   ============================================================ */

/* ------------------------------------------------------------
   CONFIG  —  edit these to personalize.
   The greeting auto-personalizes by asking each guest's name,
   so ONE link works for everyone.
   ------------------------------------------------------------ */
const CONFIG = {
  hostFamily: "Kumar Family",
  botName: "DikshantGPT",
  creator: "Dikshant Kumar",
  event: {
    title: "RING CEREMONY INVITATION",
    couple: "Krutika \u2764\uFE0F Pankaj",
    dateText: "19 June 2026",
    timeText: "6:00 PM onwards",
    venue: "Jain Bhavan Mangaldham, Rui",
    target: "2026-06-19T18:00:00",
    mapQuery: "Jain Bhavan Mangaldham, Rui",
  },
  security: {
    question: "What makes every celebration unforgettable?",
    options: ["\uD83C\uDF7D\uFE0F Great Food", "\uD83E\uDD1D Great Company", "\uD83C\uDF89 Both"],
  },
  happiness: { without: 80, with: 100 },
  stats: [
    { label: "Excitement",  value: 98 },
    { label: "Good Vibes",  value: 100 },
    { label: "Blessings",   value: 99 },

    { label: "Importance",  value: "\u221E" },

/* ------------------------------------------------------------
   DOM references
   ------------------------------------------------------------ */
const bootEl   = document.getElementById("boot");
const bootText = document.getElementById("boot-text");
const appEl    = document.getElementById("app");
const chat     = document.getElementById("chat");
const inputForm = document.getElementById("inputForm");
const userInput = document.getElementById("userInput");
const infoBtn   = document.getElementById("infoBtn");
const sidePanel = document.getElementById("sidePanel");
const closePanel = document.getElementById("closePanel");
const overlay   = document.getElementById("overlay");

/* Guest's name, captured live. */
let guestName = "friend";

/* ------------------------------------------------------------
   Tiny helpers
   ------------------------------------------------------------ */
const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
const pad2  = (n) => String(n).padStart(2, "0");
const scrollToBottom = () => { chat.scrollTop = chat.scrollHeight; };

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}

function typeText(node, text, speed = 18) {
  return new Promise((resolve) => {
    node.classList.add("caret");
    let i = 0;
    (function step() {
      node.textContent = text.slice(0, i);
      scrollToBottom();
      if (i < text.length) {
        const ch = text[i];
        i++;
        const jitter = ch === " " ? 0 : Math.random() * speed * 0.7;
        setTimeout(step, speed + jitter);
      } else {
        node.classList.remove("caret");
        resolve();
      }
    })();
  });
}

/* ------------------------------------------------------------
   Message builders
   ------------------------------------------------------------ */
function botBubble() {
  const msg = el("div", "msg bot");
  msg.innerHTML =
    '<div class="avatar">\uD83E\uDD16</div>' +
    '<div class="bubble"><div class="name">' + CONFIG.botName +
    '</div><div class="content"></div></div>';
  chat.appendChild(msg);
  scrollToBottom();
  return { msg, content: msg.querySelector(".content") };
}

function userSay(text) {
  const msg = el("div", "msg user");
  msg.innerHTML = '<div class="bubble"><div class="content"></div></div>';
  msg.querySelector(".content").textContent = text;
  chat.appendChild(msg);
  scrollToBottom();
}

async function botSay(text, opts = {}) {
  const { pre = 520, speed = 18 } = opts;
  const { content } = botBubble();
  content.innerHTML = '<span class="typing"><i></i><i></i><i></i></span>';
  await sleep(pre);
  content.innerHTML = "";
  await typeText(content, text, speed);
  return content;
}

async function thinking(ms) {
  const { msg, content } = botBubble();
  content.innerHTML = '<span class="typing"><i></i><i></i><i></i></span>';
  await sleep(ms);
  msg.remove();
}

function showChoices(options) {
  return new Promise((resolve) => {
    const wrap = el("div", "choices");
    options.forEach((opt) => {
      const b = el("button", "choice", opt.label);
      b.type = "button";
      b.addEventListener("click", () => {
        wrap.querySelectorAll("button").forEach((x) => (x.disabled = true));
        wrap.remove();
        resolve(opt);
      });
      wrap.appendChild(b);
    });
    chat.appendChild(wrap);
    scrollToBottom();
  });
}

/* Wait for the guest to type something into the input box. */
let awaitingText = null;
function askText(placeholder = "Type your answer\u2026") {
  return new Promise((resolve) => {
    userInput.disabled = false;
    userInput.placeholder = placeholder;
    userInput.focus();
    awaitingText = resolve;
  });
}

/* ------------------------------------------------------------
   Animated widgets
   ------------------------------------------------------------ */
function animateValue(fill, valNode, value, dur = 850) {
  return new Promise((resolve) => {
    const inf = value === "\u221E" || value === Infinity;
    const target = inf ? 100 : value;
    if (inf) fill.classList.add("inf");
    const start = performance.now();
    let done = false;
    const finish = () => {
      if (done) return;
      done = true;
      clearTimeout(guard);
      fill.style.width = target + "%";
      if (valNode) valNode.textContent = inf ? "\u221E" : target + "%";
      resolve();
    };
    // Timer-driven tween so it completes even if requestAnimationFrame stalls.
    function tick() {
      if (done) return;
      const t = Math.min(1, (performance.now() - start) / dur);
      const e = 1 - Math.pow(1 - t, 3);
      fill.style.width = (e * target) + "%";
      if (valNode) valNode.textContent = inf ? (t < 1 ? Math.round(e * target) + "%" : "\u221E")
                                             : Math.round(e * target) + "%";
      if (t < 1) setTimeout(tick, 16);
      else finish();
    }
    // Hard fallback guarantees the awaited flow never blocks.
    const guard = setTimeout(finish, dur + 2000);
    setTimeout(tick, 16);
  });
}

async function showStats() {
  const { content } = botBubble();
  const box = el("div", "stats");
  content.appendChild(box);
  for (const s of CONFIG.stats) {
    const row = el("div", "stat-row");
    const label = el("div", "stat-label", s.label);
    const track = el("div", "stat-track");
    const fill = el("div", "stat-fill");
    const val = el("div", "stat-val", "0%");
    track.appendChild(fill);
    row.append(label, track, val);
    box.appendChild(row);
    scrollToBottom();
    await animateValue(fill, val, s.value);
    await sleep(140);
  }
}

async function loadingBar() {
  const { content } = botBubble();
  const bar = el("div", "loadbar");
  const fill = el("div", "loadbar-fill");
  const pct = el("span", "loadbar-pct", "0%");
  bar.appendChild(fill);
  content.append(bar, pct);
  scrollToBottom();
  await animateValue(fill, pct, 100, 1700);
}

async function happinessResult() {
  const { content } = botBubble();
  const box = el("div", "happy");
  const make = (labelText, hi) => {
    const row = el("div", "happy-row" + (hi ? " hi" : ""));
    const lbl = el("span", "hl", labelText);
    const bar = el("div", "happy-bar");
    const fill = el("div", "happy-fill");
    const num = el("div", "happy-num", "0%");
    bar.appendChild(fill);
    row.append(lbl, bar, num);
    box.appendChild(row);
    return { fill, num };
  };
  const without = make("Without you \u2192 Celebration Happiness", false);
  const withYou = make("With you \u2192 Celebration Happiness", true);
  content.appendChild(box);
  scrollToBottom();
  await animateValue(without.fill, without.num, CONFIG.happiness.without, 900);
  await sleep(250);
  await animateValue(withYou.fill, withYou.num, CONFIG.happiness.with, 1100);
}

async function revealCard() {
  const { content } = botBubble();
  const ev = CONFIG.event;
  const mapURL =
    "https://www.google.com/maps/search/?api=1&query=" +
    encodeURIComponent(ev.mapQuery);
  const card = el("div", "reveal-card");
  card.innerHTML =
    '<div class="ring">\uD83D\uDC8D</div>' +
    '<div class="rc-title">' + ev.title + "</div>" +
    '<div class="rc-couple">' + ev.couple + "</div>" +
    '<div class="rc-grid">' +
      '<div><span>Date</span><b>' + ev.dateText + "</b></div>" +
      '<div><span>Time</span><b>' + ev.timeText + "</b></div>" +
      '<div class="full"><span>Venue</span><b>' + ev.venue + "</b></div>" +
    "</div>" +
    '<a class="map-btn" target="_blank" rel="noopener" href="' + mapURL +
      '">Open Location \uD83D\uDCCD</a>';
  content.appendChild(card);
  scrollToBottom();
  setTimeout(() => card.classList.add("show"), 30);
  await sleep(900);
}

async function sqlInsert() {
  const { content } = botBubble();
  const pre = el("pre", "sql");
  content.appendChild(pre);
  const safeName = guestName.replace(/'/g, "");
  const sql =
    "INSERT INTO guest_list\nVALUES\n(\n" +
    "  '" + safeName + "',\n" +
    "  'Ring Ceremony',\n" +
    "  '19-June-2026',\n" +
    "  'Confirmed'\n);";
  await typeText(pre, sql, 14);
}

function startCountdown() {
  const { content } = botBubble();
  const wrap = el("div", "countdown");
  wrap.innerHTML =
    '<div class="cd-title">Countdown to Event</div>' +
    '<div class="cd-grid">' +
      '<div class="cd-cell"><b id="cd-d">00</b><span>Days</span></div>' +
      '<div class="cd-cell"><b id="cd-h">00</b><span>Hours</span></div>' +
      '<div class="cd-cell"><b id="cd-m">00</b><span>Minutes</span></div>' +
      '<div class="cd-cell"><b id="cd-s">00</b><span>Seconds</span></div>' +
    "</div>" +
    '<div class="cd-foot">See you on 19 June \u2764\uFE0F</div>';
  content.appendChild(wrap);
  scrollToBottom();

  const target = new Date(CONFIG.event.target).getTime();
  const d = wrap.querySelector("#cd-d");
  const h = wrap.querySelector("#cd-h");
  const m = wrap.querySelector("#cd-m");
  const s = wrap.querySelector("#cd-s");
  function update() {
    let diff = target - Date.now();
    if (diff < 0) diff = 0;
    d.textContent = pad2(Math.floor(diff / 86400000));
    h.textContent = pad2(Math.floor((diff % 86400000) / 3600000));
    m.textContent = pad2(Math.floor((diff % 3600000) / 60000));
    s.textContent = pad2(Math.floor((diff % 60000) / 1000));
  }
  update();
  setInterval(update, 1000);
}

/* ------------------------------------------------------------
   Confetti
   ------------------------------------------------------------ */
const confetti = (function () {
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");
  const colors = ["#ff4d8d", "#ffd93d", "#39d0ff", "#3ef0a0", "#ffffff", "#b06bff"];
  let parts = [], raf = null, stopAt = 0;
  function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  addEventListener("resize", resize);
  resize();
  function spawn(n) {
    for (let i = 0; i < n; i++) {
      parts.push({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * canvas.height * 0.25,
        r: 4 + Math.random() * 6,
        c: colors[(Math.random() * colors.length) | 0],
        vx: -2 + Math.random() * 4,
        vy: 2 + Math.random() * 4,
        rot: Math.random() * 6.28,
        vr: -0.2 + Math.random() * 0.4,
      });
    }
  }
  function frame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const p of parts) {
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.c;
      ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6);
      ctx.restore();
    }
    parts = parts.filter((p) => p.y < canvas.height + 40);
    if (Date.now() < stopAt && parts.length < 420) spawn(7);
    if (parts.length > 0) raf = requestAnimationFrame(frame);
    else { raf = null; ctx.clearRect(0, 0, canvas.width, canvas.height); }
  }
  function burst(ms = 3000) {
    stopAt = Date.now() + ms;
    spawn(140);
    if (!raf) frame();
  }
  return { burst };
})();

/* ------------------------------------------------------------
   Side panel + commands
   ------------------------------------------------------------ */
function openPanel() { sidePanel.classList.add("open"); sidePanel.setAttribute("aria-hidden", "false"); overlay.classList.add("show"); }
function closeSide() { sidePanel.classList.remove("open"); sidePanel.setAttribute("aria-hidden", "true"); overlay.classList.remove("show"); }
infoBtn.addEventListener("click", openPanel);
closePanel.addEventListener("click", closeSide);
overlay.addEventListener("click", closeSide);

const FALLBACKS = [
  "Noted! But the most important detail is already above \u2014 hope to see you there \uD83C\uDF89",
  "I'm just a celebration bot, but I'm genuinely excited you're invited \uD83D\uDC9B",
  "That's not in my training data, but your presence definitely is \uD83D\uDE0A",
  "Try typing 'who created you?' \uD83D\uDC40",
];

async function handleCommand(raw) {
  const cmd = raw.toLowerCase().trim();
  if (cmd.includes("who created you") || cmd.includes("who made you") || cmd.includes("who built you")) {
    await botSay("Created by " + CONFIG.creator + "\n\nCurrent Status:\nExcited to celebrate with you \u2764\uFE0F");
  } else if (cmd.includes("congrat") || cmd === "blessings" || cmd.includes("best wishes")) {
    await botSay("Thank you so much \uD83D\uDE4F\n\nYour blessings mean the world to Krutika & Pankaj \u2764\uFE0F");
  } else if (cmd.includes("venue") || cmd.includes("where") || cmd.includes("location")) {
    await botSay("\uD83D\uDCCD " + CONFIG.event.venue + "\n\nTap the 'Open Location' button on the invitation card above for directions.");
  } else if (cmd.includes("when") || cmd.includes("date") || cmd.includes("time")) {
    await botSay("\uD83D\uDDD3\uFE0F " + CONFIG.event.dateText + "\n\u23F0 " + CONFIG.event.timeText);
  } else if (cmd === "help" || cmd === "/help") {
    await botSay("You can ask me:\n  \u2022 when is it?\n  \u2022 where is the venue?\n  \u2022 who created you?\n\nOr just enjoy the invitation above \uD83D\uDC8D");
  } else if (cmd.includes("who are you")) {
    await botSay("I am " + CONFIG.botName + " \u2014 your friendly Special Event Detection System \uD83E\uDD16");
  } else {
    await botSay(FALLBACKS[(Math.random() * FALLBACKS.length) | 0]);
  }
}

inputForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const v = userInput.value.trim();
  if (!v) return;
  userInput.value = "";
  if (awaitingText) {
    const resolve = awaitingText;
    awaitingText = null;
    userSay(v);
    resolve(v);
    return;
  }
  userSay(v);
  await handleCommand(v);
});

/* ------------------------------------------------------------
   Main scripted flow (Friends & Family)
   ------------------------------------------------------------ */
async function runFlow() {
  // ----- Welcome -----
  await botSay(
    "Namaste \uD83D\uDE4F  Hello \uD83D\uDC4B\n\nI am DikshantGPT.\n\n" +
    "A joyful event has been detected in the " + CONFIG.hostFamily + ".\n\n" +
    "You've been recognized as a valued guest."
  );

  // ----- Capture guest name -----
  await botSay("Before we begin \u2014 what should I call you?", { pre: 350 });
  let name = await askText("Type your name\u2026");
  guestName = (name || "friend").trim().slice(0, 40);
  userInput.placeholder = "Type a message\u2026";

  // ----- Friendly verification -----
  await botSay("Lovely to see you, " + guestName + "! \u2728\n\nRunning guest verification...");
  await sleep(250);
  await botSay("Guest Verified \u2705\n\nRunning celebration analysis...", { pre: 350 });
  await sleep(250);
  await showStats();
  await sleep(450);

  // ----- Scan -----
  await botSay("Scanning upcoming events...");
  await thinking(3000);
  await botSay("1 Special Event Found.", { pre: 200 });
  await sleep(300);

  // ----- Light fun challenge -----
  await botSay(
    "One quick question, " + guestName + ":\n\n" + CONFIG.security.question
  );
  const pick = await showChoices(
    CONFIG.security.options.map((o) => ({ label: o, value: o }))
  );
  userSay(pick.label);
  await botSay("Perfect Answer! \u2705", { pre: 300 });
  await sleep(300);

  // ----- Emotional analysis -----
  await botSay("Calculating celebration happiness...");
  await loadingBar();
  await happinessResult();
  await sleep(400);

  // ----- Reveal -----
  await botSay("Decryption complete. Revealing your invitation\u2026", { speed: 16 });
  await revealCard();
  await sleep(300);

  // ----- Personal message -----
  await botSay(
    "System Note:\n\n" +
    "This is one of the most important moments for our family.\n\n" +
    "It would mean the world to us to have you, " + guestName + ", celebrate this special day with us.\n\n" +
    "Your presence and blessings would make the occasion truly complete.",
    { pre: 500, speed: 34 }
  );
  await sleep(400);

  // ----- Decision -----
  await botSay("Will you join us, " + guestName + "?");
  const ans = await showChoices([
    { label: "\u2764\uFE0F Yes, I'll be there!", value: 1 },
    { label: "\uD83C\uDF89 Count me in!", value: 2 },
    { label: "\u2728 Wouldn't miss it!", value: 3 },
  ]);
  userSay(ans.label);

  // ----- Success -----
  confetti.burst(4500);
  await botSay("Response Received.\n\nAdding you to the guest list...", { pre: 300 });
  await sqlInsert();
  await botSay("Operation Successful \u2705", { pre: 400 });
  await sleep(300);

  // ----- Final -----
  await botSay(
    "Thank you, " + guestName + "! \uD83D\uDC9B\n\nWe can't wait to celebrate with you.",
    { pre: 300 }
  );
  startCountdown();
}

/* ------------------------------------------------------------
   Boot sequence
   ------------------------------------------------------------ */
async function boot() {
  const lines = [
    "Initializing DikshantGPT v1.0...",
    "Loading guest list...",
    "Loading celebrations...",
    "Loading family events...",
    "Loading invitations...",
    "Ready.",
  ];
  let buf = "";
  for (let k = 0; k < lines.length; k++) {
    const line = lines[k];
    for (let i = 0; i < line.length; i++) {
      buf += line[i];
      bootText.textContent = buf;
      await sleep(12);
    }
    buf += "\n";
    bootText.textContent = buf;
    await sleep(k === lines.length - 1 ? 350 : 170);
  }
  await sleep(450);
  bootEl.classList.add("hide");
  appEl.classList.remove("hidden");
  setTimeout(() => { bootEl.style.display = "none"; }, 650);
  runFlow();
}

boot();
